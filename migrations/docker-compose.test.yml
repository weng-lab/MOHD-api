services:
  postgres:
    image: postgres:15
    container_name: test-postgres
    restart: "no"    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  importer:
    build:
      context: ../importer
    container_name: test-importer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/testdb
      RNA_META_FILE: /migrations/test-data/Subset_Phase-0-Metadata.txt
      ATAC_META_FILE: /migrations/test-data/Subset_Phase_0_ATAC_Metadata_with_entity.tsv
      RNA_TPM_FILE: /migrations/test-data/Subset_Phase-0_RNA-TPM.tsv
      ATAC_ZSCORE_FILE: /migrations/test-data/Subset_Phase_0_ATAC_zscores.tsv
    volumes:
      - .:/migrations
  
  service:
    build:      
      context: ../service    
    working_dir: /usr/src/app
    container_name: test-service
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/testdb?search_path=test_schema_v1    
    depends_on:
      postgres:
        condition: service_healthy
    
    
 